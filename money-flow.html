<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      background: #050B18;
    }
    #moneyFlowChart {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="moneyFlowChart"></canvas>
  <script>
  const canvas = document.getElementById('moneyFlowChart');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const data = {
    labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    datasets: [
      {
        label: 'Income',
        data: [9, 6, 8, 7.5, 8.2, 9.3, 8.5, 10, 9.1, 8.4, 7.9, 8.7],
        backgroundColor: '#1a91c4',   // replace with your exact Figma accent
        borderRadius: 10,
        barPercentage: 0.4,
        categoryPercentage: 0.65
      },
      {
        label: 'Expense',
        data: [-6.5, -5, -6.8, -6, -5.5, -7.2, -6.3, -6.9, -6.1, -5.8, -5.4, -6],
        backgroundColor: '#1A2540',   // replace with your exact dark card colour
        borderRadius: 10,
        barPercentage: 0.4,
        categoryPercentage: 0.65
      }
    ]
  };

  const options = {
    plugins: {
      legend: {
        display: true,
        labels: {
          usePointStyle: true,
          boxWidth: 8,
          color: '#A9B4D8',
          font: { size: 11 }
        }
      },
      tooltip: {
        enabled: true,
        backgroundColor: '#050B18',
        borderColor: '#3B6CFF',
        borderWidth: 1,
        titleColor: '#E5ECFF',
        bodyColor: '#A9B4D8',
        padding: 10,
        displayColors: false,
        callbacks: {
          label: function(ctx) {
            const v = ctx.parsed.y;
            return (v >= 0 ? 'Income ' : 'Expense ') +
                   '$' + Math.abs(v).toLocaleString() + 'k';
          }
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: {
          color: '#6F7B99',
          font: { size: 11, weight: '500' }
        }
      },
      y: {
        grid: {
          color: '#202A3F',
          drawBorder: false
        },
        ticks: {
          color: '#56617F',
          font: { size: 10, weight: '500' },
          stepSize: 2,
          callback: function(v) {
            if (v === 0) return '';
            return (v > 0 ? '+' : '') + v + 'k';
          }
        },
        beginAtZero: true,
        suggestedMin: -8,
        suggestedMax: 8
      }
    },
    layout: {
      padding: { top: 10, right: 24, bottom: 16, left: 24 }
    },
    responsive: false,
    maintainAspectRatio: false
  };
  const chart = new Chart(ctx, {
    type: 'bar',
    data: data,
    options: options
  });
</script>
</body>
</html>
