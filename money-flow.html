<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      background: #050B18;
    }
    #moneyFlowChart {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="moneyFlowChart"></canvas>
  <script>
  const canvas = document.getElementById('moneyFlowChart');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Gradient fill (lighter at top, deeper at bottom)
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#6C8CFF');
  gradient.addColorStop(1, '#3254FF');

  const data = {
    labels: ['MON','TUE','WED','THU','FRI','SAT','SUN'],
    datasets: [{
      label: 'Money flow',
      data: [40, 92, 76, 125, 63, 88, 142],
      backgroundColor: gradient,
      borderRadius: 3,
      barPercentage: 0.45,
      categoryPercentage: 0.7
    }]
  };

  const options = {
    plugins: {
      legend: { display: false },
      tooltip: {
        enabled: true,
        backgroundColor: '#050B18',
        borderColor: '#3B6CFF',
        borderWidth: 1,
        titleColor: '#E5ECFF',
        bodyColor: '#A9B4D8',
        padding: 10,
        displayColors: false,
        callbacks: {
          label: function(ctx) {
            return '£' + ctx.parsed.y.toLocaleString();
          }
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: {
          color: '#6D7A9B',
          font: { size: 11 }
        }
      },
      y: {
        grid: {
          color: '#1A2439',
          drawBorder: false
        },
        ticks: {
          color: '#3D4C6F',
          font: { size: 10 },
          stepSize: 25,
          callback: function(value) {
            return '£' + value;
          }
        },
        beginAtZero: true,
        max: 150
      }
    },
    layout: {
      padding: {
        top: 10,
        right: 16,
        bottom: 12,
        left: 16
      }
    },
    responsive: false,
    maintainAspectRatio: false
  };

  new Chart(ctx, { type: 'bar', data, options });
  </script>
</body>
</html>
